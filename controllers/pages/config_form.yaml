# ===================================
#  Form Behavior Config
# ===================================

# Record name
name: Page

# Model Form Field configuration
form: $/holisun/hspagebuilder/models/page/fields.yaml

# Model Class name
modelClass: Holisun\HsPageBuilder\Models\Page

# Default redirect location
defaultRedirect: holisun/hspagebuilder/pages

# Create page
create:
    title: backend::lang.form.create_title
    redirect: holisun/hspagebuilder/pages/update/:id
    redirectClose: holisun/hspagebuilder/pages

# Update page
update:
    title: backend::lang.form.update_title
    redirect: holisun/hspagebuilder/pages
    redirectClose: holisun/hspagebuilder/pages

# Preview page
preview:
    title: backend::lang.form.preview_title
