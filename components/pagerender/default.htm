{# Check if the page exists (safety net) #}
{% if pageData %}

    {# Inject custom CSS generated by GrapesJS styling tools #}
    {% if css %}
        {% put styles %}
        <style>
            {{ pageData.css | raw }}
        </style>
        {% endput %}
    {% endif %}

    {# Inject the raw HTML layout #}
    <div class="acme-builder-content">
        {{ pageData.html | raw }}
    </div>

{% endif %}
